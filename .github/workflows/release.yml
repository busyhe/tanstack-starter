name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SITE_URL: https://example.com
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          node -e "const { version } = require('./package.json'); const expected = 'v' + version; if (process.env.GITHUB_REF_NAME !== expected) throw new Error('Expected tag ' + expected + ', received ' + process.env.GITHUB_REF_NAME)"
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tags must point to a commit already contained in main"
            exit 1
          fi

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter www exec playwright install --with-deps chromium

      - run: pnpm verify

      - name: Docker smoke test
        run: |
          docker build \
            --build-arg VITE_SITE_URL="${VITE_SITE_URL}" \
            --build-arg APP_VERSION="${GITHUB_SHA}" \
            --tag tanstack-starter:release-smoke .
          container_id="$(docker run --detach --publish 127.0.0.1:3101:3000 tanstack-starter:release-smoke)"
          cleanup() {
            docker logs "${container_id}" || true
            docker rm --force "${container_id}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          curl --fail --silent --show-error \
            --retry 20 --retry-delay 1 --retry-all-errors \
            http://127.0.0.1:3101/api/health/ready

  osv:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8

  release:
    needs: [verify, osv]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
