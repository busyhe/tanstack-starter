name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/

      # Generate changelog and create release
      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      # Extract version from tag
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Setup Docker Buildx with QEMU for multi-arch
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Build and export amd64 image
      - name: Build amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --output type=docker \
            -t nextjs-starter:${{ steps.version.outputs.VERSION }}-linux-amd64 \
            . | gzip > nextjs-starter-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz

      # Build and export arm64 image
      - name: Build arm64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --output type=docker \
            -t nextjs-starter:${{ steps.version.outputs.VERSION }}-linux-arm64 \
            . | gzip > nextjs-starter-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz

      # Upload image tarballs to GitHub Release
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nextjs-starter-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            nextjs-starter-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
