pre-commit:
  commands:
    format:
      run: pnpm prettier --cache --ignore-unknown --check {staged_files}
    lint:
      # turbo-cached, so only changed packages are actually re-linted
      run: pnpm lint

pre-push:
  commands:
    check-types:
      run: pnpm check-types

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
